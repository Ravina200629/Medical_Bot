name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git and LFS
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git lfs install
          git lfs track "data/*.pdf"
          git lfs track "*.pdf"

      # OFFICIAL DIRECT SYNC METHOD
      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Push directly using token authentication as the username string
          git push --force https://git:$HF_TOKEN@huggingface.co/spaces/Ravina200629/medibot main
