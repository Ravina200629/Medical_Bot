name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git and LFS
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git lfs install
          git lfs track "data/*.pdf"
          git lfs track "*.pdf"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # We use token authentication directly inside the push command to bypass the API block
          git remote add space https://git:$HF_TOKEN@huggingface.co/spaces/Ravina200629/medibot
          git push --force space main
