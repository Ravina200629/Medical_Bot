name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub API
        run: pip install huggingface_hub requests

      - name: Strip PDF and Push Clean Snapshot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          git checkout --orphan temp-main
          rm -f data/Medical_book.pdf
          
          git add -A
          git commit -m "Deploy clean application codebase snapshot"
          git push --force https://git:$HF_TOKEN@huggingface.co/spaces/Ravina200629/medibot temp-main:main

      # FIXED: Streams the PDF directly from GitHub's raw link so it doesn't matter that we deleted it locally
      - name: Upload Large PDF via API Bypass
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import requests
          from huggingface_hub import HfApi
          
          # Download the file directly into Python memory from your repository
          url = 'https://githubusercontent.com'
          print('Downloading PDF from GitHub source...')
          response = requests.get(url, stream=True)
          
          if response.status_code == 200:
              api = HfApi(token='${{ secrets.HF_TOKEN }}')
              print('Streaming large PDF directly into Hugging Face storage...')
              api.upload_file(
                  path_or_fileobj=response.raw,
                  path_in_repo='data/Medical_book.pdf',
                  repo_id='Ravina200629/medibot',
                  repo_type='space'
              )
              print('PDF Upload successful!')
          else:
              print(f'Failed to fetch PDF from GitHub. Status code: {response.status_code}')
              exit(1)
          "
