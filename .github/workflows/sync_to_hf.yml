name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Git LFS
        run: |
          git lfs install
          git lfs track "data/*.pdf"
          git lfs track "*.pdf"

      - name: Push to Hugging Face Hub
        uses: huggingface/hub-sync@v0.2.0
        with:
          github_repo_id: Ravina200629/Medical_Bot  # Make sure this matches your exact GitHub repo name from the log
          huggingface_repo_id: Ravina200629/medibot  # Change this to match your EXACT Hugging Face space name case
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
