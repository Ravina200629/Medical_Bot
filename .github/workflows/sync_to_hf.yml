name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub API CLI
        run: pip install huggingface_hub

      - name: Clean Git History and Push Code Only
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Remove the PDF from the local Git tracking entirely so the Git server doesn't see it
          git rm --cached data/Medical_book.pdf || true
          git commit --allow-empty -m "Exclude PDF from standard Git push"
          
          # Force push all code files to Hugging Face (this will pass instantly since the PDF is excluded)
          git push --force https://git:$HF_TOKEN@huggingface.co/spaces/Ravina200629/medibot main

      # Upload the large PDF directly to your Space's backend storage via the API
      - name: Upload Large PDF via API Bypass
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='${{ secrets.HF_TOKEN }}')
          print('Uploading large PDF via API...')
          api.upload_file(
              path_or_fileobj='data/Medical_book.pdf',
              path_in_repo='data/Medical_book.pdf',
              repo_id='Ravina200629/medibot',
              repo_type='space'
          )
          print('PDF Upload successful!')
          "
