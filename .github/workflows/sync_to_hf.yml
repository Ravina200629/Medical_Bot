name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Change to 'master' if your default branch uses that name

  # Allows you to manually run this workflow from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_HEALTHCARE }}
        run: |
          git remote add space https://Ravina200629:$HF_TOKEN@huggingface.co/spaces/Ravina200629/Medibot
          git push --force space main
