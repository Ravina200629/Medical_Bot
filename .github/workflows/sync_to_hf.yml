name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # Crucial: tells GitHub to pull LFS files

      - name: Install and configure Git LFS
        run: |
          git lfs install
          # Explicitly track PDF files so Hugging Face accepts them
          git lfs track "data/*.pdf"
          git lfs track "*.pdf"

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://Ravina200629:$HF_TOKEN@huggingface.co/spaces/Ravina200629/Medibot
          # Force push to overwrite the remote index with LFS pointers
          git push --force space main
