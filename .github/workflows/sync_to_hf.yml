name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Only fetch the latest commit, completely ignoring historical logs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub API
        run: pip install huggingface_hub

      - name: Strip PDF and Push Clean Snapshot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 1. Un-track the PDF file so Git completely forgets it exists in this snapshot
          git rm --cached data/Medical_book.pdf || true
          
          # 2. Re-create a completely fresh, history-less local Git branch
          git checkout --orphan temp-main
          git add -A
          git commit -m "Deploy clean application codebase snapshot"
          
          # 3. Force push ONLY this single history-free branch over to Hugging Face
          git push --force https://git:$HF_TOKEN@huggingface.co/spaces/Ravina200629/medibot temp-main:main

      # 4. Stream the large PDF safely through Hugging Face's backend API lane
      - name: Upload Large PDF via API Bypass
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='${{ secrets.HF_TOKEN }}')
          print('Uploading large PDF via API...')
          api.upload_file(
              path_or_fileobj='data/Medical_book.pdf',
              path_in_repo='data/Medical_book.pdf',
              repo_id='Ravina200629/medibot',
              repo_type='space'
          )
          print('PDF Upload successful!')
          "
