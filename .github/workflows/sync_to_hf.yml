name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install and configure Git LFS
        run: |
          git lfs install
          git lfs track "data/*.pdf"
          git lfs track "*.pdf"

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Note: Use 'git' as the username before the token, NOT your actual username
          git remote add space https://git:$HF_TOKEN@huggingface.co/spaces/Ravina200629/Medibot
          git push --force space main
