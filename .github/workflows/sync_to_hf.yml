name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git and LFS
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git lfs install
          git lfs track "data/*.pdf"
          git lfs track "*.pdf"

      # SAFE VERSION: Automatically strips trailing newlines and uses standard HTTP authorization headers
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Strip any potential hidden whitespace or trailing newlines from the secret variable
          CLEAN_TOKEN=$(echo "$HF_TOKEN" | xargs)
          
          git remote add space https://huggingface.co
          git config --local http.https://huggingface.co "Authorization: Bearer $CLEAN_TOKEN"
          git push --force space main
