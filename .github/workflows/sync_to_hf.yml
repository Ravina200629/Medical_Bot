name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Git LFS
        run: |
          git lfs install
          git lfs track "data/*.pdf"
          git lfs track "*.pdf"

      # Official Hugging Face Action that handles token security natively
      - name: Push to Hugging Face Hub
        uses: huggingface/hub-sync@v1
        with:
          github_repo_id: Ravina200629/Medibot  # Your GitHub Repository
          huggingface_repo_id: Ravina200629/Medibot  # Your HF Space Name
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
